[build]
  command   = "cd client && npm install && npm run build && cd ../server && npm install"
  publish   = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
